# CIRCUIT TABLES INTEGRATION
# ----------------------------------------------------------------------------
# Placeholder structure for circuit_* table integration.
# References pre-defined circuits from database tables.

circuit_tables:
  enabled: true
  
  circuit_patterns:
    warmup_circuits:
      - pattern_id: "general_warmup"
        duration_minutes: 5
        exercise_count: 4
      
      - pattern_id: "upper_body_warmup"
        duration_minutes: 5
        exercise_count: 3
    
    hyrox_circuits:
      - pattern_id: "hyrox_ski_row"
        duration_minutes: 10
        exercise_count: 2
      
      - pattern_id: "hyrox_run_burpee"
        duration_minutes: 12
        exercise_count: 2
    
    cardio_circuits:
      - pattern_id: "hiit_intervals"
        duration_minutes: 20
        exercise_count: 4
    
    mobility_circuits:
      - pattern_id: "full_body_mobility"
        duration_minutes: 10
        exercise_count: 6
  
  parameter_overrides:
    goal:
      strength:
        intensity_multiplier: 0.8
        rest_between_exercises: 60
      
      endurance:
        intensity_multiplier: 1.2
        rest_between_exercises: 30
    
    block_type:
      warmup:
        intensity_multiplier: 0.6
        rest_between_exercises: 30
      
      main:
        intensity_multiplier: 1.0
        rest_between_exercises: 45
      
      cooldown:
        intensity_multiplier: 0.4
        rest_between_exercises: 60
  
  selection_logic:
    match_primary_pattern: true
    randomness_factor: 0.2
    min_days_between_repeat: 3
    max_duration_minutes: 30

