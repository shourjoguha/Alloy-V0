    - anterior upper
    - posterior upper
    - shoulder
  
  lower:
    - anterior lower
    - posterior lower

# ----------------------------------------------------------------------------
# SESSION REGION PRIORITIES
# ----------------------------------------------------------------------------
# Primary region priorities for each session type.
# Used for intelligent upper/lower body rotation in resistance training.
# Lower values indicate higher priority (first in list gets chosen first).

session_region_priorities:
  resistance_accessory:
    - lower
    - upper
    - full
  
  resistance_circuits:
    - full
    - lower
    - upper
  
  hyrox_style:
    - full
  
  mobility_only:
    - full
  
  cardio_only:
    - full

