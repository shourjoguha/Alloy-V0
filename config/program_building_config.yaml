# ----------------------------------------------------------------------------
# DEFAULT PATTERN SUBTYPES
# ----------------------------------------------------------------------------
# Default pattern subtypes used as fallback when config values are missing.
# These are used when no specific subtypes are configured for a query type.
# Eliminates hardcoded fallback values from Python code.

default_pattern_subtypes:
  # General fallback for balanced movement selection
  balanced:
    - squat
    - hinge
    - horizontal_push
    - horizontal_pull
  
  # Strength section defaults (compound movements)
  strength:
    - squat
    - hinge
    - horizontal_push
    - horizontal_pull
  
  # Accessory section defaults (isolation and specialty movements)
  accessory:
    - vertical_push
    - vertical_pull
    - rotation
    - lunge
  
  # Carry movements (for Hyrox and functional training)
  carry:
    - farmer_carry
    - suitcase_carry
    - waiter_carry
  
  # Sled movements (for Hyrox and conditioning)
  sled:
    - sled_push
    - sled_pull
    - sled_drag

# ----------------------------------------------------------------------------
# ACCESSORY MOVEMENT PRIORITY
# ----------------------------------------------------------------------------
# Priority-based ordering for accessory movement selection.
# Controls how movements are ranked in the ORDER BY clause.
# Lower priority values are selected first (higher priority).
#
# This eliminates hardcoded ORDER BY CASE statements from Python code.
# Makes movement prioritization configurable without code changes.

accessory_movement_priority:
  - priority: 1
    condition: "vertical movements"
    condition_type: "pattern_subtype"
    subtypes:
      - vertical_push
      - vertical_pull
    description: "Prioritize vertical push/pull movements first"
  
  - priority: 2
    condition: "isolation movements"
    condition_type: "compound_flag"
    value: false
    description: "Prioritize non-compound (isolation) movements second"
  
  - priority: 3
    condition: "compound movements"
    condition_type: "compound_flag"
    value: true
    description: "Compound movements are lowest priority for accessory section"

# ----------------------------------------------------------------------------
# OLYMPIC RESTRICTIONS
# ----------------------------------------------------------------------------
# User level requirements and allowed session types for olympic movements.

olympic_restrictions:
  min_user_level: "intermediate"
  allowed_session_types:
    - resistance_accessory
    - resistance_circuits
  disciplines:
    - olympic

# ----------------------------------------------------------------------------
# HYROX WORKOUT SELECTION
# ----------------------------------------------------------------------------
# Controls how pre-built Hyrox workouts from the hyrox_workouts table are
# selected and placed into program sessions.
#
# Selection logic uses hyrox_workouts table (workout_type, total_time_minutes,
# is_complex) only. workout_goal is display-only and NOT used for selection.

hyrox_workout_selection:
  # Feature toggle — set to false to disable Hyrox workout placement entirely
  enabled: true

  # How many minutes over/under the session time budget a workout may be
  time_tolerance_minutes: 5

  # Maximum times the same workout can appear in a single program
  max_repeats_per_program: 2

  # Minimum weeks between uses of the same workout
  min_weeks_between_repeat: 2

  # Max duration (minutes) for a Hyrox workout to be placed in the accessory
  # portion of a resistance day's main block
  accessory_block_max_duration_minutes: 15

  # Workout types eligible for accessory-block placement (shorter formats)
  accessory_eligible_workout_types:
    - amrap
    - emom
    - for_time

  # Workout types eligible for full Hyrox session placement (all formats)
  session_eligible_workout_types:
    - amrap
    - emom
    - for_time
    - rounds_for_time
    - time_cap
    - ladder
    - mini_circuit
    - explicit_time_guidance

# ----------------------------------------------------------------------------
# VALIDATION RULES
# ----------------------------------------------------------------------------
validation:
  day_type_mix_sum: 100
  rest_time:
    min_seconds: 0
    max_seconds: 600
  rep_ranges:
    min_reps: 1
    max_reps: 50
  set_ranges:
    min_sets: 1
    max_sets: 10
  multipliers:
    min_multiplier: 0.0
    max_multiplier: 10.0
  pattern_exposure:
    min_threshold: 1
    max_threshold: 10
    max_consecutive: 7
    variety_window_min: 3
    variety_window_max: 14
  
  # Validation thresholds for program generation requests
  request_validation:
    program_length_weeks:
      min: 8
      max: 12
    days_per_week:
      min: 1
      max: 7
    normalized_goals:
      min_value: 0.0
      max_value: 1.0
    required_goal_keys:
      - primary_strength
      - normalized_hypertrophy_fat_loss
      - normalized_power_mobility
      - strength_bias
      - endurance_bias

