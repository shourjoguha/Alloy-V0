# Alloy AI Fitness System - Enhanced Program Configuration
# Uses pattern_subtype for granular movement selection
# This file defines session type mappings and movement constraints using pattern_subtype

session_constraints:
  warmup:
    compound: false  # Only non-compound movements
    spinal_compression: ["none", "low"]
    disciplines: ["mobility", "stretch", "athletic"]  # Real DB values
    pattern_subtypes:  # New granular pattern selection
      - mobility
      - stretch
      - activation
      - dynamic_warmup
      - plyometric  # Light plyometrics for warmup
    min_duration: 5  # minutes
    max_duration: 15  # minutes
    
  cooldown:
    compound: false
    spinal_compression: ["none", "low"]
    disciplines: ["mobility", "stretch"]  # Real DB values
    pattern_subtypes:
      - stretch
      - static_stretch
      - foam_roll
      - mobility
    min_duration: 5  # minutes
    max_duration: 15  # minutes
    
  main_blocks:
    resistance_accessory:
      compound: true
      disciplines: ["resistance training", "hypertrophy"]  # Real DB values
      requires_equipment: true
      min_duration: 20  # minutes
      max_duration: 90  # minutes
      pattern_subtypes:
        strength_section:  # Compound movements for strength
          - squat
          - hinge
          - horizontal_push
          - horizontal_pull
        accessory_section:  # Isolation/accessory movements
          - vertical_push
          - vertical_pull
          - lunge
          - rotation
      primary_regions: ["anterior upper", "posterior upper", "anterior lower", "posterior lower", "full body", "upper body", "lower body"]  # Real DB values
      equipment_priority: ["barbell", "dumbbell", "machine", "bodyweight"]
      
    resistance_circuits:
      compound: true
      disciplines: ["resistance training", "crossfit"]  # Real DB values
      circuit_based: true
      min_duration: 15  # minutes
      max_duration: 60  # minutes
      circuit_config:
        min_exercises: 3
        max_exercises: 8
        min_rounds: 2
        max_rounds: 5
      pattern_subtypes:
        compound_section:
          - squat
          - hinge
          - horizontal_push
          - horizontal_pull
        accessory_section:
          - vertical_push
          - vertical_pull
          - lunge
          - rotation
      
    hyrox_style:
      disciplines: ["resistance training", "cardio", "athletic"]  # Real DB values
      includes_cardio: true
      includes_carries: true
      min_duration: 20  # minutes
      max_duration: 45  # minutes
      pattern_subtypes:
        compound_strength:
          - squat
          - hinge
          - horizontal_push
          - horizontal_pull
        carries:
          - farmer_carry
          - suitcase_carry
        cardio:
          - run
          - row
          - bike
        sled_work:
          - sled_push
          - sled_pull
      
    mobility_only:
      compound: false
      disciplines: ["mobility", "stretch"]  # Real DB values
      spinal_compression: ["none", "low"]
      min_duration: 15  # minutes
      max_duration: 45  # minutes
      pattern_subtypes:
        - mobility
        - stretch
        - activation
        - dynamic_warmup
        - static_stretch
        - foam_roll
        - smr
        
    cardio_only:
      disciplines: ["cardio", "athletic"]  # Real DB values
      metric_types: ["time", "distance", "calories"]
      min_duration: 20  # minutes
      max_duration: 60  # minutes
      pattern_subtypes:
        - run
        - row
        - bike
        - swim
        - elliptical
        - conditioning
        - circuit
        - interval
        - hiit
    
    core_conditioning:
      compound: true
      disciplines: ["resistance training", "cardio", "athletic"]  # Real DB values
      spinal_compression: ["none", "low"]
      min_duration: 20  # minutes
      max_duration: 60  # minutes
      pattern_subtypes:
        compound_section:
          - core
          - anti_rotation
          - rotation
          - carry
        conditioning_section:
          - conditioning
          - circuit
          - interval
          - hiit

