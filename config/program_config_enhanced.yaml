# Equipment availability mapping (unchanged)
equipment_mapping:
  bodyweight: "bodyweight_possible"
  dumbbell: "dumbbell_possible"
  kettlebell: "kettlebell_possible"
  barbell: "barbell_possible"
  machine: "machine_possible"
  band: "band_possible"
  plate_or_med_ball: "plate_or_med_ball_possible"

# Olympic movement restrictions (unchanged)
olympic_restrictions:
  min_user_level: "intermediate"
  allowed_session_types: ["resistance_accessory", "resistance_circuits"]
  disciplines: ["olympic"]  # Real DB discipline